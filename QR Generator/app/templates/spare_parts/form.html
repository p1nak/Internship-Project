{% extends "base.html" %}

{% block title %}Spare Part | QR Machine Manager{% endblock %}
{% block page_heading %}{% if part %}Edit{% else %}Add{% endif %} Spare Part{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8 col-xl-6">
        <div class="card bg-glass border-0 shadow-sm">
            <div class="card-header bg-transparent border-muted py-3 d-flex justify-content-between align-items-center">
                <h5 class="mb-0 text-dark"><i class="bi bi-box-seam me-2 text-primary"></i>Inventory Part</h5>
                <span class="badge bg-light border border-muted text-dark">{{ machine.machine_name }}</span>
            </div>
            <div class="card-body p-4 text-dark">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label for="part_name" class="form-label text-muted">Part Name *</label>
                            <input type="text" class="form-control bg-light border-muted text-dark" id="part_name" name="part_name" value="{{ part.part_name if part else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="part_number" class="form-label text-muted">Part Number</label>
                            <input type="text" class="form-control bg-light border-muted text-dark" id="part_number" name="part_number" value="{{ part.part_number if part else '' }}">
                        </div>
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label for="quantity" class="form-label text-muted">Current Quantity *</label>
                            <input type="number" class="form-control bg-light border-muted text-dark" id="quantity" name="quantity" min="0" value="{{ part.quantity if part else 0 }}" required>
                        </div>
                        <div class="col-md-4">
                            <label for="min_stock_level" class="form-label text-muted">Min Stock Level</label>
                            <input type="number" class="form-control bg-light border-muted text-dark" id="min_stock_level" name="min_stock_level" min="0" value="{{ part.min_stock_level if part else 1 }}" required>
                        </div>
                        <div class="col-md-4">
                            <label for="unit_cost" class="form-label text-muted">Unit Cost (₹)</label>
                            <input type="number" step="0.01" class="form-control bg-light border-muted text-dark" id="unit_cost" name="unit_cost" min="0" value="{{ part.unit_cost if part else 0.0 }}">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="supplier" class="form-label text-muted">Supplier / Vendor</label>
                        <input type="text" class="form-control bg-light border-muted text-dark" id="supplier" name="supplier" value="{{ part.supplier if part else '' }}">
                    </div>
                    
                    <div class="d-flex justify-content-end border-top border-muted pt-3 mt-2">
                        <a href="{{ url_for('machines.profile', machine_id=machine.machine_id) }}#spares" class="btn btn-outline-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-primary fw-bold"><i class="bi bi-save me-1"></i> Save Part</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
